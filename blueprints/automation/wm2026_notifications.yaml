blueprint:
  name: WM 2026 - Push Notifications (de/en)
  description: |
    Sendet Push-Benachrichtigungen rund um die WM 2026 / WC 2026:
    * Tagesvorschau / Daily preview at chosen time
    * Anpfiff-Reminder / Kick-off reminder (10 min before favorite team match)
    * Halbzeit + Schlusspfiff / Half-time + Full-time updates

    Texte werden aus sensor.wm_2026_bracket Attribut 't' (i18n) geladen.
    Sprache umstellen via input_select.wm_2026_language.

    Voraussetzungen / Requirements:
      * Package wm2026 is installed (sensor.wm_2026_*)
      * Mobile App Companion notify-Service ready
  domain: automation
  source_url: https://github.com/eisenkarl/ha-wm-2026
  input:
    notify_service:
      name: Notify Service / Benachrichtigungs-Service
      description: Notify service to send pushes (e.g. notify.mobile_app_phone)
      selector:
        text:
    daily_preview_time:
      name: Daily Preview Time / Uhrzeit Tagesvorschau
      description: When to send the daily preview push
      default: "08:00:00"
      selector:
        time:
    enable_preview:
      name: Enable Daily Preview / Tagesvorschau aktivieren
      default: true
      selector:
        boolean:
    enable_kickoff:
      name: Enable Kick-off Reminder / Anpfiff-Reminder aktivieren
      default: true
      selector:
        boolean:
    enable_live_updates:
      name: Enable Live Updates / Live-Updates aktivieren
      description: Half-time + Full-time push for favorite-team matches
      default: true
      selector:
        boolean:

trigger:
  - platform: time
    at: !input daily_preview_time
    id: daily_preview
  - platform: template
    value_template: >-
      {% set kickoff = states('sensor.wm_2026_lieblings_team_naechstes_spiel') %}
      {% if kickoff not in ['unknown','unavailable','unbekannt',''] %}
        {% set diff = (as_datetime(kickoff) - now()).total_seconds() | int %}
        {{ 540 <= diff <= 600 }}
      {% else %}
        false
      {% endif %}
    id: kickoff_reminder
  - platform: state
    entity_id: sensor.wm_2026_lieblings_team_naechstes_spiel
    attribute: live_state
    to: halftime
    id: halftime
  - platform: state
    entity_id: sensor.wm_2026_lieblings_team_naechstes_spiel
    attribute: live_state
    to: fulltime
    id: fulltime

variables:
  t: "{{ state_attr('sensor.wm_2026_bracket','t') or {} }}"
  fav: "{{ states('input_select.wm_2026_favorite_team') }}"

action:
  - choose:
      # === Tagesvorschau / Daily Preview ===
      - conditions:
          - condition: trigger
            id: daily_preview
          - "{{ enable_preview }}"
          - condition: numeric_state
            entity_id: sensor.wm_2026_spiele_heute
            above: 0
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ t.get('notif_today_title', 'WM 2026 - Spiele heute') }}"
              message: >-
                {% set games = state_attr('sensor.wm_2026_spiele_heute','spiele') or [] %}
                {%- for g in games -%}
                {{ g.kickoff }}  {{ g.home_abbr }} vs {{ g.away_abbr }}{% if g.is_favorite %}  ({{ fav }}){% endif %}{% if not loop.last %}
                {% endif %}
                {%- endfor %}
              data:
                push:
                  interruption-level: time-sensitive
                group: wm2026
                tag: wm2026_tagesvorschau

      # === Anpfiff-Reminder / Kick-off Reminder ===
      - conditions:
          - condition: trigger
            id: kickoff_reminder
          - "{{ enable_kickoff }}"
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ t.get('notif_kickoff_title','Gleich gehts los! ({team})').replace('{team}', fav) }}"
              message: >-
                {% set gegner = state_attr('sensor.wm_2026_lieblings_team_naechstes_spiel','gegner') %}
                {% set ort = state_attr('sensor.wm_2026_lieblings_team_naechstes_spiel','spielort') %}
                {% set venue = (' - ' ~ ort) if ort else '' %}
                {{ t.get('notif_kickoff_msg','{fav} gegen {opponent} in 10 Minuten{venue}.').replace('{fav}', fav).replace('{opponent}', gegner or '').replace('{venue}', venue) }}
              data:
                push:
                  interruption-level: time-sensitive
                group: wm2026
                tag: wm2026_kickoff

      # === Halbzeit / Half-time ===
      - conditions:
          - condition: trigger
            id: halftime
          - "{{ enable_live_updates }}"
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ t.get('notif_halftime_title','Halbzeit - {team}').replace('{team}', fav) }}"
              message: >-
                {{ state_attr('sensor.wm_2026_lieblings_team_naechstes_spiel','spielstand') }}
                ({{ state_attr('sensor.wm_2026_lieblings_team_naechstes_spiel','gegner') }})
              data:
                push:
                  interruption-level: time-sensitive
                group: wm2026
                tag: wm2026_live

      # === Schlusspfiff / Full-time ===
      - conditions:
          - condition: trigger
            id: fulltime
          - "{{ enable_live_updates }}"
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ t.get('notif_fulltime_title','Schlusspfiff - {team}').replace('{team}', fav) }}"
              message: >-
                {{ state_attr('sensor.wm_2026_lieblings_team_naechstes_spiel','spielstand') }}
                ({{ state_attr('sensor.wm_2026_lieblings_team_naechstes_spiel','gegner') }})
              data:
                push:
                  interruption-level: time-sensitive
                group: wm2026
                tag: wm2026_live

mode: single
