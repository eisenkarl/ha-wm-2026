# ===================================================================
# WM 2026 Dashboard - Beispiel-Konfiguration (i18n: de + en)
# ===================================================================
# Diese Datei NICHT in /config/ ablegen, sondern den Inhalt im
# Raw-Konfigurations-Editor eines neuen Dashboards einfuegen:
#   Einstellungen -> Dashboards -> Dashboard hinzufuegen
#   -> "Neues Dashboard von Grund auf"
#   -> Neues Dashboard oeffnen -> Stift -> 3-Punkte-Menue
#   -> "Raw-Konfigurations-Editor"
#   -> kompletten Inhalt durch diese YAML ersetzen
#
# Sprache umstellen: helpers -> input_select.wm_2026_language (de/en).
# Flag-Bilder werden von https://flagcdn.com/ geladen (kostenlos, kein Key).
# ===================================================================

title: WM 2026
views:
  - title: WM 2026
    path: wm-2026
    icon: mdi:soccer
    cards:
      # Einstellungen (Team + Sprache)
      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_select.wm_2026_favorite_team
            name: Favorite Team / Lieblings-Team
          - entity: input_select.wm_2026_language
            name: Language / Sprache

      # Tagesuebersicht / naechster Spieltag
      - type: markdown
        entities:
          - input_select.wm_2026_favorite_team
          - input_select.wm_2026_language
          - sensor.wm_2026_spiele_heute
          - sensor.wm_2026_naechster_spieltag
          - sensor.wm_2026_bracket
        content: |
          {% set t = state_attr('sensor.wm_2026_bracket','t') or {} %}
          {% set iso2_map = state_attr('sensor.wm_2026_bracket','iso2_map') or {} %}
          {%- macro flag(abbr, size='20x15') -%}
          ![{{ abbr }}](https://flagcdn.com/{{ size }}/{{ iso2_map.get(abbr,'un') }}.png)
          {%- endmacro -%}
          {% set today_count = states('sensor.wm_2026_spiele_heute') | int(0) %}
          {% set today_games = state_attr('sensor.wm_2026_spiele_heute','spiele') or [] %}
          {% set next_day = states('sensor.wm_2026_naechster_spieltag') %}
          {% set next_games = state_attr('sensor.wm_2026_naechster_spieltag','spiele') or [] %}
          {% set tage_bis = state_attr('sensor.wm_2026_naechster_spieltag','tage_bis') | int(0) %}
          {% set fav = states('input_select.wm_2026_favorite_team') %}

          ## {{ t.get('title_today','WM 2026') }}

          {% if today_count > 0 %}
          ### {{ t.get('today','Heute') }} - {{ now().strftime('%A, %d.%m.%Y') }}
          {% set games = today_games %}
          {% elif next_day != 'keine' %}
          ### {{ t.get('next_matchday','Naechster Spieltag') }}: {{ as_datetime(next_day).strftime('%A, %d.%m.%Y') }}
          *({{ t.get('in_days','in {n} Tag{plural}').replace('{n}', tage_bis | string).replace('{plural}', ('en' if tage_bis != 1 else '') if states('input_select.wm_2026_language') == 'de' else ('s' if tage_bis != 1 else '')) }})*
          {% set games = next_games %}
          {% else %}
          ### {{ t.get('no_matches','Keine WM-Spiele in Sicht') }}
          {% set games = [] %}
          {% endif %}

          {% if games | length > 0 %}
          | {{ t.col_time }} | {{ t.col_match }} | {{ t.col_status }} | {{ t.col_venue }} |
          |------|-----------|--------|-----|
          {% for g in games -%}
          | **{{ g.kickoff }}** | {{ flag(g.home_abbr) }} {% if g.is_favorite %}**{{ g.home }} - {{ g.away }}**{% else %}{{ g.home }} - {{ g.away }}{% endif %} {{ flag(g.away_abbr) }}{% if g.is_live or g.is_final %} ({{ g.home_score }}:{{ g.away_score }}){% endif %} | {{ g.status }} | {{ g.city }} |
          {% endfor %}
          {% endif %}

      # Lieblings-Team Fokus
      - type: markdown
        entities:
          - input_select.wm_2026_favorite_team
          - input_select.wm_2026_language
          - sensor.wm_2026_bracket
        content: |
          {% set t = state_attr('sensor.wm_2026_bracket','t') or {} %}
          {% set iso2_map = state_attr('sensor.wm_2026_bracket','iso2_map') or {} %}
          {%- macro flag(abbr, size='20x15') -%}
          ![{{ abbr }}](https://flagcdn.com/{{ size }}/{{ iso2_map.get(abbr,'un') }}.png)
          {%- endmacro -%}
          {% set fav = states('input_select.wm_2026_favorite_team') %}
          {% set fav_iso2 = state_attr('sensor.wm_2026_bracket','favorite_iso2') or 'un' %}
          {% set all_fav = namespace(list=[]) %}
          {% set group_m = state_attr('sensor.wm_2026_bracket','group_matches') or {} %}
          {% set ko_m = state_attr('sensor.wm_2026_bracket','ko_matches') or {} %}
          {% for matches in group_m.values() %}
            {% for m in matches %}
              {% if m.favorite %}
                {% set all_fav.list = all_fav.list + [{'phase': t.phase_group, 'm': m}] %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% for slug, matches in ko_m.items() %}
            {% for m in matches %}
              {% if m.favorite %}
                {% set all_fav.list = all_fav.list + [{'phase': t.get('phase_' ~ slug, slug), 'm': m}] %}
              {% endif %}
            {% endfor %}
          {% endfor %}

          ## {{ t.get('title_favorite','Lieblings-Team - Alle Spiele') }}

          ![flag](https://flagcdn.com/32x24/{{ fav_iso2 }}.png) **{{ t.team }}: {{ fav }}**

          {% if all_fav.list | length == 0 %}
          *{{ t.get('no_fav_matches','').replace('{team}', fav) }}*
          {% else %}
          | {{ t.col_phase }} | {{ t.col_date }} | {{ t.col_match }} | {{ t.col_status }} |
          |-------|-------|-----------|--------|
          {% for entry in all_fav.list | sort(attribute='m.date') -%}
          | {{ entry.phase }} | {{ as_datetime(entry.m.date).strftime('%d.%m. %H:%M') }} | {{ flag(entry.m.home.abbr) }} {% if entry.m.home.winner %}**{{ entry.m.home.name }}**{% else %}{{ entry.m.home.name }}{% endif %} {% if entry.m.is_final or entry.m.is_live %}**{{ entry.m.home.score }}:{{ entry.m.away.score }}**{% else %}-{% endif %} {% if entry.m.away.winner %}**{{ entry.m.away.name }}**{% else %}{{ entry.m.away.name }}{% endif %} {{ flag(entry.m.away.abbr) }} | {{ entry.m.status }} |
          {% endfor %}
          {% endif %}

      # Gruppenphase
      - type: markdown
        entities:
          - input_select.wm_2026_favorite_team
          - input_select.wm_2026_language
          - sensor.wm_2026_bracket
        content: |
          {% set t = state_attr('sensor.wm_2026_bracket','t') or {} %}
          {% set iso2_map = state_attr('sensor.wm_2026_bracket','iso2_map') or {} %}
          {%- macro flag(abbr, size='20x15') -%}
          ![{{ abbr }}](https://flagcdn.com/{{ size }}/{{ iso2_map.get(abbr,'un') }}.png)
          {%- endmacro -%}
          {% set fav = states('input_select.wm_2026_favorite_team') %}
          {% set groups = state_attr('sensor.wm_2026_bracket','groups') or {} %}
          {% set matches = state_attr('sensor.wm_2026_bracket','group_matches') or {} %}

          ## {{ t.get('title_groups','WM 2026 - Gruppenphase') }}

          {% for g in groups.keys() | sort %}
          {% set teams = groups[g] %}
          {% set is_fav_group = teams | selectattr('favorite') | list | length > 0 %}

          ### {{ t.group }} {{ g }}{% if is_fav_group %} {{ flag(fav, '20x15') }}{% endif %}

          | {{ t.col_rank }} | {{ t.col_team }} | {{ t.col_played }} | {{ t.col_won }} | {{ t.col_draw }} | {{ t.col_loss }} | {{ t.col_goals }} | {{ t.col_diff }} | {{ t.col_pts }} |
          |---|------|----|----|----|----|------|------|-----|
          {% for tm in teams -%}
          | {{ tm.rank }} | {{ flag(tm.abbr) }} {% if tm.favorite %}**{{ tm.team }}**{% else %}{{ tm.team }}{% endif %} | {{ tm.played }} | {{ tm.won }} | {{ tm.draw }} | {{ tm.loss }} | {{ tm.gf }}:{{ tm.ga }} | {{ '%+d' % tm.gd }} | **{{ tm.pts }}** |
          {% endfor %}

          {% set games = matches.get(g, []) %}
          {% if games | length > 0 %}
          **{{ t.matches }}:**
          {% for m in games -%}
          - {{ as_datetime(m.date).strftime('%d.%m. %H:%M') }}: {% if m.favorite %}⭐ {% endif -%}
          {{ flag(m.home.abbr) }} {% if m.home.winner %}**{{ m.home.name }}**{% else %}{{ m.home.name }}{% endif %}
          {%- if m.is_final or m.is_live %} **{{ m.home.score }}:{{ m.away.score }}** {% else %} - {% endif -%}
          {% if m.away.winner %}**{{ m.away.name }}**{% else %}{{ m.away.name }}{% endif %} {{ flag(m.away.abbr) }}
          {% endfor %}
          {% endif %}

          ---
          {% endfor %}

      # KO-Phase
      - type: markdown
        entities:
          - input_select.wm_2026_favorite_team
          - input_select.wm_2026_language
          - sensor.wm_2026_bracket
        content: |
          {% set t = state_attr('sensor.wm_2026_bracket','t') or {} %}
          {% set iso2_map = state_attr('sensor.wm_2026_bracket','iso2_map') or {} %}
          {%- macro flag(abbr, size='20x15') -%}
          ![{{ abbr }}](https://flagcdn.com/{{ size }}/{{ iso2_map.get(abbr,'un') }}.png)
          {%- endmacro -%}
          {% set ko = state_attr('sensor.wm_2026_bracket','ko_matches') or {} %}
          {% set ko_slugs = ['round-of-32', 'round-of-16', 'quarterfinals', 'semifinals', '3rd-place-match', 'final'] %}

          ## {{ t.get('title_ko','WM 2026 - KO-Phase') }}

          {% for slug in ko_slugs %}
          ### {{ t.get('phase_' ~ slug, slug) }}

          {% set games = ko.get(slug, []) %}
          {% if games | length == 0 %}
          *{{ t.ko_empty }}*
          {% else %}
          | {{ t.col_date }} | {{ t.col_match }} | {{ t.col_venue }} |
          |-------|-----------|-----|
          {% for g in games -%}
          | **{{ as_datetime(g.date).strftime('%d.%m. %H:%M') }}** | {% if g.favorite %}⭐ {% endif -%}
          {{ flag(g.home.abbr) }} {% if g.home.winner %}**{{ g.home.name }}**{% else %}{{ g.home.name }}{% endif -%}
          {% if g.is_final or g.is_live %} **{{ g.home.score }}:{{ g.away.score }}**{% endif %} - {% if g.away.winner %}**{{ g.away.name }}**{% else %}{{ g.away.name }}{% endif %} {{ flag(g.away.abbr) }} | {{ g.city }} |
          {% endfor %}
          {% endif %}

          {% endfor %}

          ---
          *{{ t.updated }}: {{ as_datetime(state_attr('sensor.wm_2026_bracket','fetched_at')).strftime('%d.%m.%Y %H:%M') if state_attr('sensor.wm_2026_bracket','fetched_at') else '-' }}*
